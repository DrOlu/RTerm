name: Sync Build and Release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force build even if no upstream changes"
        required: false
        default: "false"
        type: string
      release_mode:
        description: "sync = version tracks upstream; feature = keep our local version.json (for our own feature releases)"
        required: false
        default: "sync"
        type: choice
        options:
          - sync
          - feature

concurrency:
  group: rterm-sync-build
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  UPSTREAM_REPO: "MrOrangeJJ/GyShell"
  UPSTREAM_BRANCH: "main"

permissions:
  contents: write

jobs:
  sync:
    name: Sync from upstream GyShell
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout RTerm
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check upstream version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r '.version' version.json 2>/dev/null || echo "0.0.0")
          echo "current_version=$CURRENT_VERSION"

          # In feature release mode we ship OUR local version (already bumped
          # in-tree). Skip the upstream version comparison entirely and never
          # clobber version.json/package.json with upstream's number.
          if [ "${{ inputs.release_mode }}" = "feature" ]; then
            echo "Feature release mode: building and releasing v$CURRENT_VERSION as-is"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "skip_upstream_merge=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          UPSTREAM_LATEST=$(curl -sL "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest" \
            | jq -r '.tag_name // "0.0.0"' | sed 's/^v//')
          echo "upstream_latest=$UPSTREAM_LATEST"

          CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          CURRENT_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          UPSTREAM_MAJOR=$(echo "$UPSTREAM_LATEST" | cut -d. -f1)
          UPSTREAM_MINOR=$(echo "$UPSTREAM_LATEST" | cut -d. -f2)
          UPSTREAM_PATCH=$(echo "$UPSTREAM_LATEST" | cut -d. -f3)

          CURRENT_PADDED=$(printf "%03d%03d%03d" "$CURRENT_MAJOR" "$CURRENT_MINOR" "$CURRENT_PATCH")
          UPSTREAM_PADDED=$(printf "%03d%03d%03d" "$UPSTREAM_MAJOR" "$UPSTREAM_MINOR" "$UPSTREAM_PATCH")

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force build requested"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$UPSTREAM_LATEST" >> $GITHUB_OUTPUT
          elif [ "$UPSTREAM_PADDED" -gt "$CURRENT_PADDED" ]; then
            echo "New upstream version: $CURRENT_VERSION → $UPSTREAM_LATEST"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$UPSTREAM_LATEST" >> $GITHUB_OUTPUT
          else
            echo "No new upstream version (current: $CURRENT_VERSION, upstream: $UPSTREAM_LATEST)"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.should_build == 'true' && steps.check.outputs.skip_upstream_merge != 'true'
        run: |
          git config user.name "RTerm Sync Bot"
          git config user.email "rterm-bot@hyperspace.ng"
          git remote add upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
          git merge upstream/${{ env.UPSTREAM_BRANCH }} -X ours --no-edit || {
            git diff --name-only --diff-filter=U | while read file; do
              git checkout --ours "$file"
              git add "$file"
            done
            git commit --no-edit -m "chore: merge upstream GyShell (resolve conflicts)"
          }

      - name: Apply rebrand
        if: steps.check.outputs.should_build == 'true'
        run: |
          # In feature release mode the rebrand + version clobber must NOT
          # run: our version.json/package.json already hold the correct local
          # version and our code changes are committed in-tree.
          if [ "${{ inputs.release_mode }}" = "feature" ]; then
            echo "Feature release mode: skipping rebrand + version clobber"
            exit 0
          fi
          chmod +x scripts/rebrand.sh 2>/dev/null || true
          if [ -f "scripts/rebrand.sh" ]; then
            bash scripts/rebrand.sh
          fi
          # Restore RTerm icons (overwritten by upstream merge)
          if [ -d "scripts/rterm-icons" ]; then
            cp -f scripts/rterm-icons/icon.png apps/electron/materials/icon.png
            cp -f scripts/rterm-icons/icon.icns apps/electron/materials/icon.icns
            cp -f scripts/rterm-icons/icon.ico apps/electron/materials/icon.ico
            for size in 16x16 32x32 48x48 64x64 128x128 256x256 512x512; do
              cp -f scripts/rterm-icons/${size}.png apps/electron/materials/icons/${size}.png 2>/dev/null || true
            done
            cp -f scripts/rterm-icons/mobile-web-icon.png apps/electron/mobile-web-runtime/icon.png 2>/dev/null || true
            cp -f scripts/rterm-icons/mobile-web-public-icon.png apps/mobile-web/public/icon.png 2>/dev/null || true
            echo "Restored RTerm icons from scripts/rterm-icons/"
          fi
          jq --arg v "${{ steps.check.outputs.new_version }}" '.version = $v' version.json > version.json.tmp && mv version.json.tmp version.json
          jq --arg v "${{ steps.check.outputs.new_version }}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "${{ steps.check.outputs.new_version }}" '.version = $v | .name = "rterm" | .packages[""].version = $v | .packages[""].name = "rterm"' package-lock.json > package-lock.json.tmp && mv package-lock.json.tmp package-lock.json
          git add -A
          git diff --cached --stat
          git commit -m "chore: sync from GyShell v${{ steps.check.outputs.new_version }} and rebrand" --allow-empty

      - name: Push changes
        if: steps.check.outputs.should_build == 'true'
        run: git push origin main

  build-mac:
    name: Build macOS ARM64
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          find dist -maxdepth 1 -name "*.dmg" | while read f; do
            echo "Uploading $f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: rterm-mac
          path: dist/*arm64.dmg
          retention-days: 1

  build-win:
    name: Build Windows x64
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
        continue-on-error: true
      - name: Remove canvas (fails without dev headers)
        shell: pwsh
        run: Remove-Item -Recurse -Force node_modules\canvas -ErrorAction SilentlyContinue
      - name: Fix Windows spawnSync
        shell: pwsh
        run: |
          $files = @('apps/electron/prepare-cli-runtime.mjs', 'apps/electron/prepare-mobile-web.mjs')
          foreach ($f in $files) {
            if (Test-Path $f) {
              $content = Get-Content $f -Raw
              $patched = $content -replace "stdio: 'inherit'", "shell: true, stdio: 'inherit'"
              Set-Content $f $patched -NoNewline
              Write-Host "Patched $f"
            }
          }
      - run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: rterm-win
          path: |
            dist/*Portable*.exe
            dist/*Setup*.exe
          retention-days: 1

  build-linux-x64:
    name: Build Linux x64
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rpm fakeroot dpkg libarchive-tools
      - run: npm install || true
      - run: rm -rf node_modules/canvas
      - run: npm run dist:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: rterm-linux-x64
          path: |
            dist/*x64.AppImage
            dist/*x64.deb
            dist/*x64.pacman
            dist/*x64.rpm
          retention-days: 1

  build-linux-arm64:
    name: Build Linux ARM64
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rpm fakeroot dpkg libarchive-tools
      - run: npm install || true
      - run: rm -rf node_modules/canvas
      - run: npm run dist:linux-arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: rterm-linux-arm64
          path: |
            dist/*arm64.AppImage
            dist/*arm64.deb
            dist/*arm64.rpm
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [sync, build-mac, build-win, build-linux-x64, build-linux-arm64]
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List assets
        run: ls -lh dist/ || true
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NAME: "RTerm v${{ steps.version.outputs.version }}"
          RELEASE_BODY: |
            RTerm v${{ steps.version.outputs.version }} — AI-Native Terminal App by Hyperspace Technologies

            Synced from upstream GyShell, with RTerm-specific enhancements.

            ## What's new in RTerm v1.6.3

            - **Fix: Algorithms preset + TERM actually reach the SSH backend.** In v1.6.1/v1.6.2, connecting from the Connections panel dropped the *Algorithms* and *TERM* fields when building the runtime config, so Cisco/legacy raw-shell mode never engaged (SFTP warning + hang at "Opening interactive shell..." persisted). The saved connection's `algorithmsPreset` and `termType` are now forwarded, so **Algorithms: Cisco / Network gear + TERM: vt100** works as intended.

            ## What's new in RTerm v1.6.2

            - **Fix: Cisco / legacy SSH interactive shell now opens.** On v1.6.1 the connection succeeded but the shell hung at "Opening interactive shell..." because ssh2 sent `env` channel requests that Cisco IOS doesn't acknowledge, and the POSIX shell-integration injection (`base64`/`eval`) produced garbage on a network OS. The `cisco` and `legacy` presets now use a **raw-shell mode**: no `env` requests, no SFTP init, no OS-detection exec probes, and no shell-integration injection — the device's prompt streams straight through. Set **Algorithms: Cisco / Network gear** (or **Legacy**) and **TERM: vt100** in the Connections panel.

            ## What's new in RTerm v1.6.1

            - **Legacy / Cisco SSH support.** New *Algorithms* preset (Modern / Legacy / Cisco) and optional *TERM* type field on saved SSH connections. Older network gear (Cisco IOS/IOS-XE, legacy switches/routers) that only offers `diffie-hellman-group1-sha1`, `ssh-rsa`, `aes*-cbc`, `hmac-sha1` now connects successfully instead of failing the SSH handshake. Select **Algorithms: Cisco / Network gear** (or **Legacy**) in the Connections panel.
            - **`open_terminal_tab` agent tool.** The AI agent can now open a new SSH terminal tab from a saved connection by Name or ID, instead of only operating on already-open tabs. Saved SSH connections are surfaced to the agent in the system info. Duplicate-open is detected and reported. Enables fully autonomous "connect to server X and run …" workflows.

            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS ARM64 | `RTerm-${{ steps.version.outputs.version }}-arm64.dmg` |
            | Windows x64 (Portable) | `RTerm.Portable.${{ steps.version.outputs.version }}-x64.exe` |
            | Windows x64 (Setup) | `RTerm.Setup.${{ steps.version.outputs.version }}-x64.exe` |
            | Linux x64 (AppImage) | `RTerm-${{ steps.version.outputs.version }}-x64.AppImage` |
            | Linux x64 (deb) | `RTerm-${{ steps.version.outputs.version }}-x64.deb` |
            | Linux x64 (pacman) | `RTerm-${{ steps.version.outputs.version }}-x64.pacman` |
            | Linux x64 (rpm) | `RTerm-${{ steps.version.outputs.version }}-x64.rpm` |
            | Linux ARM64 (AppImage) | `RTerm-${{ steps.version.outputs.version }}-arm64.AppImage` |
            | Linux ARM64 (deb) | `RTerm-${{ steps.version.outputs.version }}-arm64.deb` |
            | Linux ARM64 (rpm) | `RTerm-${{ steps.version.outputs.version }}-arm64.rpm` |

            ## Install

            **macOS:** After installing, run `xattr -cr /Applications/RTerm.app` to remove quarantine.

            **Linux AppImage:** `chmod +x RTerm-*.AppImage && ./RTerm-*.AppImage`

            **Linux deb:** `sudo dpkg -i RTerm-*.deb`

            **Linux rpm:** `sudo rpm -i RTerm-*.rpm`

            See [GyShell changelog](https://github.com/MrOrangeJJ/GyShell/releases/tag/v${{ steps.version.outputs.version }}) for details.

            ---

            Contact: rterm@hyperspace.ng
        run: |
          set -uo pipefail
          printf '%s\n' "$RELEASE_BODY" > /tmp/release-notes.md
          ASSETS="dist/*.dmg dist/*.exe dist/*.AppImage dist/*.deb dist/*.pacman dist/*.rpm"
          # Resilient create/update: retries through transient GitHub API 5xx
          # (softprops/action-gh-release failed repeatedly with 503 Unicorn
          # pages on getReleaseByTag). gh CLI + explicit retry avoids that.
          OK=0
          for attempt in 1 2 3 4 5; do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              # Release already exists (e.g. a prior attempt published it
              # without assets) — upload/overwrite assets.
              if gh release upload "$RELEASE_TAG" --clobber $ASSETS; then
                echo "Assets uploaded to existing release $RELEASE_TAG"
                OK=1
                break
              fi
            else
              if gh release create "$RELEASE_TAG" \
                  --title "$RELEASE_NAME" \
                  --notes-file /tmp/release-notes.md \
                  --target main \
                  $ASSETS; then
                echo "Created release $RELEASE_TAG with assets"
                OK=1
                break
              fi
            fi
            echo "Release attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          if [ "$OK" != "1" ]; then
            echo "::error::Failed to create/upload release $RELEASE_TAG after 5 attempts"
            exit 1
          fi
          gh release view "$RELEASE_TAG" --json name,tagName,assets | jq '{tag:.tagName, name, assets:[.assets[].name]}'

      - name: Notify Multica autopilot
        if: success()
        run: |
          # Fire the Multica RTerm Release Pipeline autopilot directly.
          # We cannot rely on the release: published event because GitHub
          # blocks that event from triggering downstream workflows when the
          # release is created inside a running workflow (even with a PAT).
          python3 -c "
          import json, urllib.request, os
          payload = json.dumps({
            'action': 'published',
            'release': {
              'tag_name': 'v${{ steps.version.outputs.version }}',
              'draft': False,
              'prerelease': False
            },
            'repository': {
              'full_name': 'DrOlu/RTerm',
              'name': 'RTerm'
            }
          }).encode()
          req = urllib.request.Request(
            'https://api.multica.ai/api/webhooks/autopilots/awt_jZXas3khd6pPhcNi7CkZTSBRbI_iDUsz-jSV2PN_blw',
            data=payload,
            headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          print('Multica RTerm autopilot notified')
          "

      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="✅ Released"
          if [ "${{ job.status }}" != "success" ]; then STATUS="❌ Failed"; fi
          VERSION="${{ steps.version.outputs.version }}"
          PAYLOAD=$(jq -nc \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "${STATUS} *RTerm v${VERSION}*

          Built from GyShell v${VERSION}.
          All platforms: macOS, Windows, Linux (x64 + ARM64).

          https://github.com/DrOlu/RTerm/releases/tag/v${VERSION}" \
            '{chat_id:$chat_id,parse_mode:"Markdown",text:$text}')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
