name: Notify Multica on Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to notify about (e.g. v1.4.3)'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Multica autopilot
        env:
          WEBHOOK_URL: https://api.multica.ai/api/webhooks/autopilots/awt_jZXas3khd6pPhcNi7CkZTSBRbI_iDUsz-jSV2PN_blw
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          python3 -c "
          import json, urllib.request, os, time
          payload = json.dumps({
            'action': 'published',
            'release': {
              'tag_name': os.environ.get('TAG_NAME', ''),
              'draft': False,
              'prerelease': False
            },
            'repository': {
              'full_name': os.environ.get('GITHUB_REPOSITORY', ''),
              'name': os.environ.get('GITHUB_REPOSITORY', '').split('/', 1)[-1] if '/' in os.environ.get('GITHUB_REPOSITORY', '') else ''
            }
          }).encode()
          req = urllib.request.Request(os.environ['WEBHOOK_URL'], data=payload, headers={'Content-Type': 'application/json'})
          last_err = None
          for attempt in range(1, 6):
              try:
                  urllib.request.urlopen(req, timeout=30)
                  print(f'Webhook delivered on attempt {attempt}')
                  break
              except Exception as e:
                  last_err = e
                  print(f'Attempt {attempt} failed: {e}')
                  if attempt < 5:
                      time.sleep(10 * attempt)
          else:
              print(f'All 5 attempts failed; last error: {last_err}')
              raise SystemExit(1)
          "
