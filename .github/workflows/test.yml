name: Test

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rterm-test-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  quality-gate:
    name: Typecheck, Lint, Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Rebuild native modules for Node runtime
        run: npm run ensure:node-native

      - name: Typecheck (all workspaces)
        run: npm run typecheck:all

      - name: Lint
        run: npm run lint

      - name: Layout & UI extreme tests
        run: npm run test:layout-ui-extreme

      - name: Backend unit extreme tests
        run: npm run test:backend-unit-extreme

      - name: Automation extreme tests
        run: npm run test:automation-extreme

      - name: Deprecated CLI guard tests
        run: npm run test:desktop-cli-deprecated

  build-smoke:
    name: Build Smoke (backend + electron bundle)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build backend bundle
        run: npm run build:backend

      - name: Build electron bundles (main + preload + renderer)
        run: npm run build:electron
