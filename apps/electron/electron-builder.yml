appId: com.rterm.app
productName: RTerm
npmRebuild: false
afterPack: apps/electron/scripts/after-pack.mjs
artifactBuildCompleted: apps/electron/scripts/normalize-linux-artifact-name.mjs
toolsets:
  # Use the newer AppImage runtime/toolset so Linux ARM64 builds do not rely on
  # the legacy AppImage runtime that has known loader issues on some systems.
  appimage: "1.0.2"
directories:
  output: dist
  buildResources: apps/electron/materials
files:
  - from: .
    filter:
      - out/**/*
      - apps/gybackend/dist/**/*
      - apps/gybackend/package.json
      - package.json
      - "!**/*.map"
      - "!**/*.d.ts"
      - "!**/*.d.cts"
      - "!**/*.d.mts"
      - "!node_modules/@types/**"
      - "!node_modules/@xterm/addon-fit/**"
      - "!node_modules/@xterm/addon-search/**"
      - "!node_modules/@xterm/addon-web-links/**"
      - "!node_modules/@xterm/addon-webgl/**"
      - "!node_modules/@xterm/xterm/**"
      - "!node_modules/canvas/**"
      - "!node_modules/clsx/**"
      - "!node_modules/i18next/**"
      - "!node_modules/lucide-react/**"
      - "!node_modules/mobx/**"
      - "!node_modules/mobx-react-lite/**"
      - "!node_modules/pdfjs-dist/**"
      - "!node_modules/pdf-parse/lib/pdf.js/v1.9.426/**"
      - "!node_modules/pdf-parse/lib/pdf.js/v1.10.88/**"
      - "!node_modules/pdf-parse/lib/pdf.js/v2.0.550/**"
      - "!node_modules/react/**"
      - "!node_modules/react-dom/**"
      - "!node_modules/react-i18next/**"
      - "!node_modules/react-markdown/**"
      - "!node_modules/react-resizable-panels/**"
      - "!node_modules/remark-gfm/**"
      - "!node_modules/better-sqlite3/bin/**"
      - "!node_modules/better-sqlite3/deps/**"
      - "!node_modules/better-sqlite3/src/**"
      - "!node_modules/better-sqlite3/binding.gyp"
      - "!node_modules/better-sqlite3/build/deps/**"
      - "!node_modules/better-sqlite3/build/*.mk"
      - "!node_modules/better-sqlite3/build/*.Makefile"
      - "!node_modules/better-sqlite3/build/Makefile"
      - "!node_modules/better-sqlite3/build/config.gypi"
      - "!node_modules/better-sqlite3/build/gyp-mac-tool"
      - "!node_modules/better-sqlite3-electron/bin/**"
      - "!node_modules/better-sqlite3-electron/deps/**"
      - "!node_modules/better-sqlite3-electron/src/**"
      - "!node_modules/better-sqlite3-electron/binding.gyp"
      - "!node_modules/better-sqlite3-electron/build/deps/**"
      - "!node_modules/better-sqlite3-electron/build/*.mk"
      - "!node_modules/better-sqlite3-electron/build/*.Makefile"
      - "!node_modules/better-sqlite3-electron/build/Makefile"
      - "!node_modules/better-sqlite3-electron/build/config.gypi"
      - "!node_modules/better-sqlite3-electron/build/gyp-mac-tool"
      - "!node_modules/tree-sitter-bash/bin/**"
      - "!node_modules/tree-sitter-bash/build/**"
      - "!node_modules/tree-sitter-bash/prebuilds/**"
      - "!node_modules/tree-sitter-bash/src/**"
      - "!node_modules/tree-sitter-bash/node_modules/**"
      - "!node_modules/tree-sitter-bash/binding.gyp"
      - "!node_modules/web-tree-sitter/debug/**"
extraResources:
  - from: apps/electron/cli-runtime
    to: cli
    filter:
      - "**/*"
  - from: node_modules/better-sqlite3-electron/build/Release
    to: native-modules/better-sqlite3
    filter:
      - better_sqlite3.node
  - from: apps/electron/mobile-web-runtime
    to: mobile-web
    filter:
      - "**/*"
  - from: apps/electron/materials/icons/512x512.png
    to: icon.png
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/lib/**/*.js"
  - "node_modules/node-pty/prebuilds/**/*"
  - "node_modules/node-pty/build/Release/**/*"
mac:
  icon: apps/electron/materials/icon.icns
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: null
  extendInfo:
    LSMinimumSystemVersion: "12.0.0"
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
win:
  icon: apps/electron/materials/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  artifactName: "${productName}.Setup.${version}-${arch}.${ext}"
portable:
  artifactName: "${productName}.Portable.${version}-${arch}.${ext}"
linux:
  icon: apps/electron/materials/icons
  executableName: rterm
  target:
    - target: AppImage
    - target: deb
    - target: pacman
    - target: rpm
  category: Development
  desktop:
    entry:
      Name: RTerm
      Comment: AI-Native Terminal App
      StartupWMClass: rterm
  artifactName: "${productName}-${version}-${arch}.${ext}"
appImage:
  artifactName: "${productName}-${version}-${arch}.${ext}"
deb:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  maintainer: "Hyperspace Technologies <rterm@hyperspace.ng>"
  # Post-install script restores chrome-sandbox SUID permissions and works
  # around electron-builder's 0x0 icon-size bug (#5294).
  afterInstall: apps/electron/scripts/postinstall-linux.sh
pacman:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
    - libappindicator-gtk3
rpm:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # Post-install script restores chrome-sandbox SUID permissions and works
  # around electron-builder's 0x0 icon-size bug (#5294).
  afterInstall: apps/electron/scripts/postinstall-linux.sh
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
